<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIFROST E-Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+Thai:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#fff4dc;--paper:#fffdf5;--ink:#2d2342;--muted:#786a8a;
      --gold:#c98817;--gold2:#ffd86a;--sky:#72c7ec;--aqua:#63d3cb;--pink:#ff9dbb;
      --green:#2f9a64;--red:#d24654;--line:rgba(201,136,23,.32);
      --shadow:0 18px 46px rgba(89,61,20,.18);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--ink)}
    body{font-family:"Noto Sans Thai","Segoe UI",sans-serif;overflow-x:hidden}
    .scene{
      min-height:100vh;padding:18px 16px 28px;position:relative;isolation:isolate;
      background:
        radial-gradient(circle at 12% 12%,rgba(255,157,187,.34),transparent 28%),
        radial-gradient(circle at 86% 8%,rgba(114,199,236,.42),transparent 31%),
        radial-gradient(circle at 50% 92%,rgba(255,216,106,.38),transparent 36%),
        linear-gradient(180deg,#fff8e8 0%,#eaf8ff 48%,#fff4dc 100%);
    }
    .scene::before{
      content:"";position:absolute;inset:0;z-index:-1;opacity:.42;
      background-image:
        radial-gradient(circle,rgba(255,255,255,.86) 0 2px,transparent 3px),
        linear-gradient(120deg,transparent 0 44%,rgba(255,255,255,.55) 45% 46%,transparent 47%),
        linear-gradient(60deg,transparent 0 48%,rgba(201,136,23,.14) 49% 50%,transparent 51%);
      background-size:38px 38px,92px 92px,118px 118px;
    }
    .app{max-width:430px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .brand{letter-spacing:4px;color:var(--gold);font:700 17px Cinzel,serif;text-shadow:0 2px 0 #fff}
    .sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:2px}
    .back{
      text-decoration:none;color:#7a4d04;background:rgba(255,255,255,.78);
      border:2px solid rgba(255,216,106,.82);border-radius:999px;padding:8px 13px;font-weight:800;font-size:12px;
      box-shadow:0 5px 0 rgba(201,136,23,.18);
    }
    .wallet-card{
      position:relative;overflow:hidden;border:1px solid rgba(185,138,24,.4);border-radius:18px;
      background:
        radial-gradient(circle at 18% 22%,rgba(255,255,255,.78),transparent 28%),
        linear-gradient(145deg,#fffdf5 0%,#fff0b8 42%,#c9f4ff 100%);
      box-shadow:var(--shadow),inset 0 0 0 4px rgba(255,255,255,.52);padding:22px 20px 20px;
    }
    .wallet-card::before{
      content:"";position:absolute;right:-52px;top:-56px;width:160px;height:160px;border-radius:50%;
      border:24px solid rgba(255,255,255,.45);
    }
    .wallet-card::after{
      content:"✦";position:absolute;right:28px;top:26px;color:#fff;font-size:42px;
      text-shadow:0 0 12px rgba(255,216,106,.9),0 3px 0 rgba(201,136,23,.18);
      animation:twinkle 2.4s ease-in-out infinite;
    }
    @keyframes twinkle{0%,100%{transform:scale(1) rotate(0deg);opacity:.88}50%{transform:scale(1.18) rotate(10deg);opacity:1}}
    .treasure{
      display:flex;align-items:center;justify-content:center;width:92px;height:92px;margin:0 auto 12px;
      border-radius:28px;background:linear-gradient(150deg,#fff 0%,#fff0ae 45%,#8fe4f0 100%);
      border:3px solid rgba(255,216,106,.9);box-shadow:0 12px 26px rgba(88,123,154,.18),inset 0 0 0 5px rgba(255,255,255,.6);
      font-size:52px;position:relative;
    }
    .treasure::before,.treasure::after{position:absolute;font-size:18px;color:var(--gold);text-shadow:0 2px 0 #fff}
    .treasure::before{content:"✦";left:-10px;top:6px}.treasure::after{content:"◆";right:-9px;bottom:9px;color:var(--sky)}
    .label{font-size:12px;color:var(--muted);letter-spacing:2px;font-weight:700}
    .coin-row{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-top:8px;position:relative}
    .coin{font-size:50px;line-height:1;font-weight:800;color:#7b5510;text-shadow:0 3px 0 #fff,0 8px 18px rgba(201,136,23,.18)}
    .unit{font-size:14px;color:var(--gold);font-weight:800;margin-bottom:8px}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
    .pill{background:rgba(255,255,255,.72);border:2px solid rgba(255,216,106,.54);border-radius:14px;padding:10px;box-shadow:0 5px 0 rgba(201,136,23,.12)}
    .pill b{display:block;font-size:17px;color:var(--ink)}
    .pill span{font-size:11px;color:var(--muted)}
    .panel{
      margin-top:14px;background:rgba(255,255,255,.78);border:2px solid rgba(255,216,106,.42);
      border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(70,46,18,.08),inset 0 0 0 3px rgba(255,255,255,.38);
    }
    .panel-title{font:700 13px Cinzel,serif;color:var(--gold);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .panel-title::before{content:"✦";color:var(--pink);font-family:"Noto Sans Thai";font-size:15px}
    .amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .chip{
      border:2px solid rgba(255,216,106,.64);background:#fffaf0;color:var(--ink);
      border-radius:14px;padding:11px 6px;font:800 13px "Noto Sans Thai";cursor:pointer;
      box-shadow:0 5px 0 rgba(201,136,23,.14);
    }
    .chip.on{background:linear-gradient(135deg,#ff9dbb,var(--gold2));color:white;box-shadow:0 8px 18px rgba(255,157,187,.28)}
    .field{display:grid;gap:6px;margin-bottom:12px}
    .field label{font-size:12px;color:var(--muted);font-weight:700}
    .field input{
      width:100%;border:2px solid rgba(114,199,236,.32);background:white;border-radius:14px;
      padding:12px 13px;font:700 16px "Noto Sans Thai";color:var(--ink);outline:none;
      box-shadow:inset 0 2px 0 rgba(114,199,236,.08);
    }
    .field input:focus{border-color:var(--sky);box-shadow:0 0 0 4px rgba(114,199,236,.18)}
    .quote{
      display:flex;justify-content:space-between;align-items:center;background:#eefbff;
