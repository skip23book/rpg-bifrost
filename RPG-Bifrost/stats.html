<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BB STATS | RPG BIFROST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+Thai:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#1a1a2e;--panel:#22233f;--panel2:#2b2d50;--ink:#fff8df;--muted:#b8b3ca;
      --gold:#ffd700;--gold2:#c99222;--aqua:#67d9ff;--blue:#7aa2ff;--pink:#ff8ec7;
      --green:#8ee48e;--red:#ff7373;--line:rgba(255,215,0,.28);
      --shadow:0 18px 46px rgba(0,0,0,.34);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--ink)}
    body{font-family:"Noto Sans Thai","Segoe UI",sans-serif;overflow-x:hidden}
    .scene{
      min-height:100vh;padding:18px 14px 30px;position:relative;isolation:isolate;
      background:
        radial-gradient(circle at 18% 8%,rgba(103,217,255,.18),transparent 28%),
        radial-gradient(circle at 84% 12%,rgba(255,215,0,.16),transparent 28%),
        radial-gradient(circle at 50% 100%,rgba(255,142,199,.10),transparent 34%),
        linear-gradient(180deg,#101427 0%,#1a1a2e 48%,#131528 100%);
    }
    .scene::before{
      content:"";position:absolute;inset:0;z-index:-1;opacity:.18;
      background-image:
        linear-gradient(120deg,transparent 0 46%,rgba(255,215,0,.75) 47% 48%,transparent 49%),
        linear-gradient(60deg,transparent 0 48%,rgba(103,217,255,.52) 49% 50%,transparent 51%);
      background-size:120px 120px,92px 92px;
    }
    .app{width:min(980px,100%);margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .brand{font:700 22px Cinzel,serif;letter-spacing:4px;color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.42)}
    .sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:2px}
    .back{
      text-decoration:none;color:var(--ink);border:1px solid var(--line);
      background:rgba(255,255,255,.06);border-radius:999px;padding:9px 13px;font-weight:800;font-size:12px;
      box-shadow:0 5px 0 rgba(0,0,0,.18);white-space:nowrap;font-family:inherit;cursor:pointer;
    }
    .hero{
      position:relative;overflow:hidden;border:1px solid var(--line);border-radius:16px;
      background:
        radial-gradient(circle at 18% 22%,rgba(255,255,255,.12),transparent 24%),
        linear-gradient(145deg,rgba(255,215,0,.18),rgba(34,35,63,.96) 42%,rgba(103,217,255,.13));
      box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.08);padding:20px;
      margin-bottom:14px;
    }
    .hero::after{content:"✦";position:absolute;right:22px;top:18px;color:var(--gold);font-size:48px;opacity:.75;text-shadow:0 0 18px rgba(255,215,0,.5)}
    .hero h1{font:700 28px/1.1 Cinzel,serif;letter-spacing:2px;color:#fff;margin-bottom:8px}
    .hero p{font-size:13px;line-height:1.7;color:var(--muted);max-width:640px}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .stat{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.18);border-radius:12px;
      padding:12px;min-height:76px;
    }
    .stat span{display:block;font-size:10px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase}
    .stat b{display:block;margin-top:5px;font-size:21px;color:var(--gold)}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .card{
      background:linear-gradient(180deg,rgba(43,45,80,.96),rgba(27,28,52,.96));
      border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow);
    }
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    .title{font:700 14px Cinzel,serif;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:8px}
    .title::before{content:"";width:7px;height:7px;background:var(--gold);transform:rotate(45deg);display:inline-block}
    .hint{font-size:11px;color:var(--muted);text-align:right}
    .chart-wrap{position:relative;width:100%;height:360px}
    .status{
      margin-top:12px;color:var(--muted);font-size:12px;line-height:1.7;text-align:center;
      background:rgba(0,0,0,.16);border:1px dashed rgba(255,215,0,.18);border-radius:12px;padding:10px;
    }
    .status.bad{color:#ffd1d1;border-color:rgba(255,115,115,.35)}
    .status.good{color:#dcffdf;border-color:rgba(142,228,142,.35)}
    @media (min-width:860px){.grid{grid-template-columns:1fr 1fr}.hero h1{font-size:34px}}
    @media (max-width:620px){
      .scene{padding:14px 10px 24px}.top{align-items:flex-start}.brand{font-size:18px;letter-spacing:3px}
      .hero{padding:16px}.hero h1{font-size:24px}.summary{grid-template-columns:1fr 1fr}
      .chart-wrap{height:315px}.card{padding:12px}.card-head{display:block}.hint{text-align:left;margin-top:5px}
    }
    @media (max-width:360px){.summary{grid-template-columns:1fr}.back{padding:8px 10px;font-size:11px}}
  </style>
</head>
<body>
  <main class="scene">
    <div class="app">
      <header class="top">
        <div>
          <div class="brand">BIFROST</div>
          <div class="sub">BB STATS ARCHIVE</div>
        </div>
        <button class="back" id="closePageBtn" type="button">ออกจากหน้านี้</button>
      </header>

      <section class="hero">
        <h1>BB STATS</h1>
